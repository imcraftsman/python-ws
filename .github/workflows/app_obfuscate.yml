name: Obfuscate app.py to new file

on:
  push:
    branches: [ main ]
    paths:
      - 'app.py'
  workflow_dispatch: # 支持手动点击运行

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予 Actions 推送代码的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyArmor
        run: pip install pyarmor

      - name: Run Obfuscation
        run: |
          # 1. 执行混淆，输出到临时目录 dist
          pyarmor gen app.py
          
          # 2. 将混淆后的主文件重命名为 app_encoded.py 并移回根目录
          mv dist/app.py ./app_encoded.py
          
          # 3. 必须把 pyarmor_runtime 文件夹也拿出来，否则 app_encoded.py 无法运行
          # 如果已存在旧的 runtime 文件夹则先删除，确保更新
          rm -rf ./pyarmor_runtime_000000
          cp -r dist/pyarmor_runtime_000000 ./
          
          # 4. 清理临时生成的 dist 目录
          rm -rf dist

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add app_encoded.py pyarmor_runtime_000000/
          
          # 只有在文件确实有变化时才提交，避免报错
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update obfuscated app_encoded.py"
            git push
          fi
